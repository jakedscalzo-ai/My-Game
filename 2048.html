<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Game Font */
        body {
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            background-color: #faf8ef;
            color: #776e65;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column; /* Stack elements vertically */
            padding: 20px; /* Add padding for smaller screens */
        }
        #hubButton{
    background:#8f7a66;
    color:#f9f6f2;
    border:none;
    border-radius:6px;
    padding:8px 12px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
}

#hubButton:hover{
    background:#9f8b77;
}

        /* Main Game Container */
        .game-container {
            text-align: center;
            margin-bottom: 20px; /* Space between header and grid */
        }

        /* Header: Title and Score */
        .header {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            width: 100%;
            max-width: min(90vw, 90vh, 500px); /* Match grid width */
            margin: 0 auto 20px auto; /* Center horizontally with bottom margin */
        }

        .title {
            font-size: 4em;
            font-weight: bold;
            color: #776e65;
            margin-bottom: -5px;
        }

        /* Score Boxes */
        .score-container, .best-container {
            background-color: #bbada0;
            padding: 10px 20px;
            border-radius: 3px;
            text-align: center;
            min-width: 80px; /* Ensure minimum width */
        }

        .score-container span, .best-container span {
            display: block;
            font-size: 0.8em;
            color: #eee4da;
            font-weight: bold;
        }

        .score-value, .best-value {
            font-size: 1.5em;
            color: #ffffff;
            font-weight: bold;
        }

        /* Buttons Container */
        .controls {
            display: flex;
            justify-content: space-between; /* Space out title and button */
            align-items: center;
            width: 100%;
            max-width: min(90vw, 90vh, 500px); /* Match grid width */
            margin: 0 auto 20px auto; /* Center horizontally with bottom margin */
        }

        .game-intro {
            color: #776e65;
            font-size: 1.1em;
            line-height: 1.5;
            text-align: left; /* Align intro text left */
            flex-grow: 1; /* Allow text to take available space */
            margin-right: 20px; /* Space between text and button */
        }

        /* New Game Button Styling */
        .new-game-button {
            background-color: #8f7a66;
            color: #f9f6f2;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.2s ease;
            white-space: nowrap; /* Prevent button text wrapping */
        }

        .new-game-button:hover {
            background-color: #9f8b77;
        }

        /* Game Grid Container */
        .grid-container {
            position: relative; /* Needed for absolute positioning of tiles */
            width: min(90vw, 90vh, 500px); /* Responsive width based on viewport size */
            height: min(90vw, 90vh, 500px); /* Responsive height based on viewport size */
            background-color: #bbada0;
            border-radius: 6px;
            padding: 15px;
            display: grid;
            /* Use calc() to account for gaps */
            grid-template-columns: repeat(4, calc(25% - 11.25px)); /* 15px total gap / 3 gaps = 5px per gap side. (15px * 3) / 4 columns = 11.25px */
            grid-template-rows: repeat(4, calc(25% - 11.25px));
            gap: 15px;
            margin: 0 auto; /* Center horizontally */
        }

        /* Background Grid Cells */
        .grid-cell {
            background-color: #cdc1b4;
            border-radius: 3px;
        }

        /* Tiles */
        .tile {
            position: absolute; /* Positioned relative to grid-container */
            width: calc(25% - 11.25px); /* Match cell size */
            height: calc(25% - 11.25px); /* Match cell size */
            border-radius: 3px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em; /* Default font size, adjust per value */
            background-color: #eee4da; /* Default background */
            color: #776e65; /* Default text color */
            transition: top 0.1s ease-out, left 0.1s ease-out, width 0.1s ease-out, height 0.1s ease-out, font-size 0.1s ease-out, transform 0.25s ease-in-out;
            z-index: 10;
            margin: 0; /* Ensure no margins affect positioning */
            padding: 0; /* Ensure no padding affects positioning */
        }

        .tile.new {
            animation: appear 0.25s ease-in-out;
        }

        .tile.merged {
            animation: pop 0.25s ease-in-out;
            z-index: 20; /* Ensure merged tiles appear above others */
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* Tile Color and Font Size Variations */
        .tile[data-value="2"]   { background-color: #eee4da; color: #776e65; }
        .tile[data-value="4"]   { background-color: #ede0c8; color: #776e65; }
        .tile[data-value="8"]   { background-color: #f2b179; color: #f9f6f2; }
        .tile[data-value="16"]  { background-color: #f59563; color: #f9f6f2; }
        .tile[data-value="32"]  { background-color: #f67c5f; color: #f9f6f2; }
        .tile[data-value="64"]  { background-color: #f65e3b; color: #f9f6f2; }
        .tile[data-value="128"] { background-color: #edcf72; color: #f9f6f2; font-size: 1.8em; }
        .tile[data-value="256"] { background-color: #edcc61; color: #f9f6f2; font-size: 1.8em; }
        .tile[data-value="512"] { background-color: #edc850; color: #f9f6f2; font-size: 1.8em; }
        .tile[data-value="1024"]{ background-color: #edc53f; color: #f9f6f2; font-size: 1.5em; }
        .tile[data-value="2048"]{ background-color: #edc22e; color: #f9f6f2; font-size: 1.5em; }
        /* Add more styles for higher values if needed */
        .tile[data-value="4096"]{ background-color: #3c3a32; color: #f9f6f2; font-size: 1.5em; }
        .tile[data-value="8192"]{ background-color: #3c3a32; color: #f9f6f2; font-size: 1.5em; }


        /* Game Over/Win Message Overlay */
        .game-message {
            display: none; /* Hidden by default */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(238, 228, 218, 0.73); /* Semi-transparent overlay */
            z-index: 100;
            text-align: center;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px; /* Match grid container */
            animation: fade-in 0.5s ease;
        }

        .game-message p {
            font-size: 2.5em;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message .retry-button {
             background-color: #8f7a66;
            color: #f9f6f2;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .game-message .retry-button:hover {
            background-color: #9f8b77;
        }

        .game-message.active {
            display: flex; /* Show the message with flex layout */
        }

        @keyframes fade-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 600px) {
            .title { font-size: 2em; }
            .game-intro { font-size: 1em; }
            .new-game-button { font-size: 0.9em; padding: 8px 15px; }
            .score-container span, .best-container span { font-size: 0.7em; }
            .score-value, .best-value { font-size: 1.2em; }
            .grid-container { padding: 10px; gap: 10px; }
            /* Adjust tile size calculation for smaller gaps */
            .grid-container {
                grid-template-columns: repeat(4, calc(25% - 7.5px));
                grid-template-rows: repeat(4, calc(25% - 7.5px));
            }
            .tile {
                width: calc(25% - 7.5px);
                height: calc(25% - 7.5px);
                font-size: 1.5em; /* Adjust font size on smaller screens */
            }
            .tile[data-value="128"],
            .tile[data-value="256"],
            .tile[data-value="512"] { font-size: 1.3em; }
            .tile[data-value="1024"],
            .tile[data-value="2048"],
            .tile[data-value="4096"],
            .tile[data-value="8192"] { font-size: 1.1em; }

            .game-message p { font-size: 1.8em; }
            .game-message .retry-button { font-size: 0.9em; padding: 8px 15px; }
        }
        
        /* Add responsiveness for landscape orientation */
        @media (orientation: landscape) and (max-height: 600px) {
            .header, .controls, .grid-container {
                max-width: min(80vh, 500px);
                max-height: min(80vh, 500px);
            }
            body {
                padding: 10px;
            }
            .title {
                font-size: 2em;
            }
        }
         @media (max-width: 400px) {
             .header { flex-direction: column; align-items: stretch; gap: 10px;}
             .title { text-align: center; }
             .score-info { display: flex; justify-content: space-around;}
             .controls { flex-direction: column; align-items: stretch; gap: 10px;}
             .game-intro { text-align: center; margin-right: 0;}
             .new-game-button { width: 100%; }
         }

    </style>
</head>
<body>



    <div class="game-container">
        <div class="header">
            <h1 class="title">2048</h1>

            <button id="hubButton"
                    onclick="location.href='index.html'">
                Back To Hub
            </button>

            <div class="score-info" style="display:flex;gap:10px;">
                <div class="score-container">
                    <span>SCORE</span>
                    <div id="score" class="score-value">0</div>
                </div>

                <div class="best-container">
                    <span>BEST</span>
                    <div id="best-score" class="best-value">0</div>
                </div>
            </div>
        </div>

        <div class="controls">
             <p class="game-intro">Join the numbers and get to the <strong>2048 tile!</strong></p>
            <button id="new-game-button" class="new-game-button">New Game</button>
        </div>

        <div class="grid-container" id="grid-container">
            <div class="game-message" id="game-message">
                <p id="message-text">Game Over!</p>
                <button id="retry-button" class="retry-button">Try Again</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gridContainer = document.getElementById('grid-container');
            const scoreElement = document.getElementById('score');
            const bestScoreElement = document.getElementById('best-score');
            const newGameButton = document.getElementById('new-game-button');
            const messageContainer = document.getElementById('game-message');
            const messageText = document.getElementById('message-text');
            const retryButton = document.getElementById('retry-button');

            const GRID_SIZE = 4;
            const CELL_GAP = getComputedStyle(gridContainer).gap; // Get gap from CSS
            const CELL_SIZE_PERCENT = 25; // Percentage width/height of a cell

            let board = []; // 2D array representing the game state
            let score = 0;
            let bestScore = localStorage.getItem('bestScore2048') || 0;
            let isGameOver = false;
            let touchStartX = 0;
            let touchStartY = 0;
            let touchEndX = 0;
            let touchEndY = 0;

            // --- Initialization ---

            function setupInput() {
                document.addEventListener('keydown', handleKeydown);
                gridContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
                gridContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
                gridContainer.addEventListener('touchend', handleTouchEnd, { passive: false });
                newGameButton.addEventListener('click', startGame);
                retryButton.addEventListener('click', startGame);
                
                // Add resize handler to update the board when window is resized
                window.addEventListener('resize', () => {
                    // Update immediately during resize for better visual experience
                    updateTilePositions();
                });
            }
            
            function updateTilePositions() {
                const tiles = document.querySelectorAll('.tile');
                if (tiles.length === 0) return; // No tiles to update
                
                // Calculate these values once for all tiles
                const gapValue = parseFloat(CELL_GAP);
                const containerPadding = parseFloat(getComputedStyle(gridContainer).paddingLeft);
                const cellSize = (gridContainer.offsetWidth - 2 * containerPadding - (GRID_SIZE - 1) * gapValue) / GRID_SIZE;
                
                // Pre-calculate font sizes for different tile values
                const fontSizes = {
                    small: `${Math.max(cellSize * 0.3, 16)}px`,   // For 1024+
                    medium: `${Math.max(cellSize * 0.35, 18)}px`, // For 128-512
                    large: `${Math.max(cellSize * 0.4, 20)}px`    // For 2-64
                };
                
                tiles.forEach(tile => {
                    const row = parseInt(tile.dataset.row);
                    const col = parseInt(tile.dataset.col);
                    const value = parseInt(tile.dataset.value);
                    
                    // Update size
                    tile.style.width = `${cellSize}px`;
                    tile.style.height = `${cellSize}px`;
                    
                    // Update font size based on value
                    if (value >= 1024) {
                        tile.style.fontSize = fontSizes.small;
                    } else if (value >= 128) {
                        tile.style.fontSize = fontSizes.medium;
                    } else {
                        tile.style.fontSize = fontSizes.large;
                    }
                    
                    // Update position - calculate directly for better performance
                    tile.style.top = `${containerPadding + row * (cellSize + gapValue)}px`;
                    tile.style.left = `${containerPadding + col * (cellSize + gapValue)}px`;
                });
            }

            function createBackgroundGrid() {
                gridContainer.innerHTML = ''; // Clear previous grid/tiles first
                 // Re-add the message container (cleared above)
                gridContainer.appendChild(messageContainer);
                messageContainer.classList.remove('active'); // Ensure it's hidden initially

                for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                    const cell = document.createElement('div');
                    cell.classList.add('grid-cell');
                    gridContainer.appendChild(cell);
                }
            }

            function initializeBoard() {
                board = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(0));
                score = 0;
                isGameOver = false;
                updateScore(0);
                updateBestScoreDisplay();
                messageContainer.classList.remove('active');
            }

            function startGame() {
                console.log("Starting new game...");
                initializeBoard();
                createBackgroundGrid(); // Recreate background cells and clear old tiles
                addRandomTile();
                addRandomTile();
                renderBoard(); // Initial render
            }

            // --- Tile Management ---

            function addRandomTile() {
                if (isBoardFull()) return; // No space left

                let added = false;
                while (!added) {
                    const r = Math.floor(Math.random() * GRID_SIZE);
                    const c = Math.floor(Math.random() * GRID_SIZE);
                    if (board[r][c] === 0) {
                        // Add a 2 (90% chance) or 4 (10% chance)
                        board[r][c] = Math.random() < 0.9 ? 2 : 4;
                        createTileElement(r, c, board[r][c], true); // Pass true for 'new' tile animation
                        added = true;
                    }
                }
            }

            function createTileElement(row, col, value, isNew = false, isMerged = false) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.dataset.value = value; // Set value for styling
                tile.dataset.row = row;     // Store position data
                tile.dataset.col = col;
                tile.textContent = value;
                
                // Apply animations based on tile state
                if (isNew) {
                    tile.classList.add('new');
                } else if (isMerged) {
                    tile.classList.add('merged');
                }
                
                // Calculate size based on grid cells
                const gapValue = parseFloat(CELL_GAP);
                const containerPadding = parseFloat(getComputedStyle(gridContainer).paddingLeft);
                const cellSize = (gridContainer.offsetWidth - 2 * containerPadding - (GRID_SIZE - 1) * gapValue) / GRID_SIZE;
                
                // Apply exact size to match grid cells
                tile.style.width = `${cellSize}px`;
                tile.style.height = `${cellSize}px`;
                
                // Adjust font size based on tile value and size
                if (value >= 1024) {
                    tile.style.fontSize = `${Math.max(cellSize * 0.3, 16)}px`;
                } else if (value >= 128) {
                    tile.style.fontSize = `${Math.max(cellSize * 0.35, 18)}px`;
                } else {
                    tile.style.fontSize = `${Math.max(cellSize * 0.4, 20)}px`;
                }
                
                // Position directly (no need for separate function call)
                tile.style.top = `${containerPadding + row * (cellSize + gapValue)}px`;
                tile.style.left = `${containerPadding + col * (cellSize + gapValue)}px`;
                
                gridContainer.appendChild(tile);
                return tile;
            }

            // This function is now obsolete since we calculate positions directly in createTileElement and updateTilePositions
            // Keeping it as a simple wrapper for compatibility with existing code
            function updateTilePosition(tileElement, row, col) {
                const gapValue = parseFloat(CELL_GAP);
                const containerPadding = parseFloat(getComputedStyle(gridContainer).paddingLeft);
                const cellSize = (gridContainer.offsetWidth - 2 * containerPadding - (GRID_SIZE - 1) * gapValue) / GRID_SIZE;
                
                tileElement.style.top = `${containerPadding + row * (cellSize + gapValue)}px`;
                tileElement.style.left = `${containerPadding + col * (cellSize + gapValue)}px`;
            }


            // --- Rendering ---
            
            // We'll keep track of merged positions for animations
            let mergedPositions = new Set(); // Keeps track of merged positions
            
            function renderBoard() {
                // Remove existing tile elements
                const existingTiles = Array.from(gridContainer.querySelectorAll('.tile'));
                existingTiles.forEach(tile => tile.remove());
                
                // Create new tiles for the current board state
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (board[r][c] !== 0) {
                            // Check if this position had a merge
                            const isMerged = mergedPositions.has(`${r},${c}`);
                            createTileElement(r, c, board[r][c], false, isMerged);
                        }
                    }
                }
                
                console.log("Board rendered:", board);
            }


            // --- Game Logic (Moves) ---

            function handleKeydown(event) {
                if (isGameOver) return;

                let moved = false;
                switch (event.key) {
                    case 'ArrowUp':
                    case 'w': // Allow WASD controls
                        event.preventDefault(); // Prevent page scrolling
                        moved = moveUp();
                        break;
                    case 'ArrowDown':
                    case 's':
                        event.preventDefault();
                        moved = moveDown();
                        break;
                    case 'ArrowLeft':
                    case 'a':
                        event.preventDefault();
                        moved = moveLeft();
                        break;
                    case 'ArrowRight':
                    case 'd':
                        event.preventDefault();
                        moved = moveRight();
                        break;
                    default:
                        return; // Ignore other keys
                }

                if (moved) {
                    // Use setTimeout to allow move animation to mostly finish
                    // Increased delay to match our tile transition time
                    setTimeout(() => {
                        addRandomTile();
                        if (checkGameOver()) {
                            endGame();
                        }
                    }, 300); // Match transition duration for smooth animation
                }
            }

             // --- Touch Handling ---
            function handleTouchStart(event) {
                if (isGameOver) return;
                // Prevent scrolling while swiping on the game board
                event.preventDefault();
                touchStartX = event.touches[0].clientX;
                touchStartY = event.touches[0].clientY;
            }

            function handleTouchMove(event) {
                 if (isGameOver) return;
                 // Prevent scrolling
                 event.preventDefault();
                touchEndX = event.touches[0].clientX;
                touchEndY = event.touches[0].clientY;
            }

            function handleTouchEnd(event) {
                if (isGameOver) return;
                // event.preventDefault(); // No default action to prevent on touchend

                if (!touchStartX || !touchStartY) return; // Ensure start points exist

                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;
                const absDx = Math.abs(dx);
                const absDy = Math.abs(dy);

                // Minimum swipe distance threshold
                const swipeThreshold = 30;

                let moved = false;

                if (Math.max(absDx, absDy) > swipeThreshold) { // Only register significant swipes
                    if (absDy > absDx) { // Vertical swipe
                        if (dy < 0) {
                            // Swipe Up
                            moved = moveUp();
                        } else {
                            // Swipe Down
                            moved = moveDown();
                        }
                    } else { // Horizontal swipe
                        if (dx < 0) {
                            // Swipe Left
                            moved = moveLeft();
                        } else {
                            // Swipe Right
                            moved = moveRight();
                        }
                    }
                }

                if (moved) {
                    // Match the timing with our keyboard handler
                    setTimeout(() => {
                        addRandomTile();
                        if (checkGameOver()) {
                            endGame();
                        }
                    }, 300); // Match transition duration for smooth animation
                }

                // Reset touch coordinates
                touchStartX = 0;
                touchStartY = 0;
                touchEndX = 0;
                touchEndY = 0;
            }


            // --- Move Implementation ---

            function moveUp() {
                return move(0, -1); // Move direction: row change = -1, col change = 0
            }
            function moveDown() {
                return move(0, 1);  // Move direction: row change = 1, col change = 0
            }
            function moveLeft() {
                return move(-1, 0); // Move direction: row change = 0, col change = -1
            }
            function moveRight() {
                return move(1, 0); // Move direction: row change = 0, col change = 1
            }

            // Generic move function refactored later - start with specific ones
             function moveUp() {
                let moved = false;
                // Clear any previous merge tracking for animation purposes
                mergedPositions = new Set();
                
                for (let c = 0; c < GRID_SIZE; c++) {
                    let currentCol = board.map(row => row[c]); // Get column
                    let slidCol = slide(currentCol);
                    let combinedCol = combine(slidCol);
                    let finalCol = slide(combinedCol.arr); // Slide again after combining

                    // Check if the column changed
                    for(let r=0; r < GRID_SIZE; r++) {
                        if (board[r][c] !== finalCol[r]) {
                             moved = true;
                        }
                        board[r][c] = finalCol[r];
                        
                        // Track merges for animation purposes
                        if (finalCol[r] && finalCol[r] !== currentCol[r] && currentCol[r] !== 0) {
                            mergedPositions.add(`${r},${c}`);
                        }
                    }
                     updateScore(combinedCol.scoreToAdd);
                }
                
                if (moved) {
                    // Update visuals for the move
                    renderBoard();
                }
                return moved;
            }

            function moveDown() {
                let moved = false;
                // Clear any previous merge tracking for animation purposes
                mergedPositions = new Set();
                
                for (let c = 0; c < GRID_SIZE; c++) {
                    let currentCol = board.map(row => row[c]).reverse(); // Get column and reverse for down move
                    let slidCol = slide(currentCol);
                    let combinedCol = combine(slidCol);
                    let finalCol = slide(combinedCol.arr).reverse(); // Slide, combine, slide, then reverse back

                    for(let r=0; r < GRID_SIZE; r++) {
                        if (board[r][c] !== finalCol[r]) {
                            moved = true;
                        }
                        
                        // Track merges for animation purposes
                        if (finalCol[r] && finalCol[r] !== board[r][c] && board[r][c] !== 0) {
                            mergedPositions.add(`${r},${c}`);
                        }
                        
                        board[r][c] = finalCol[r];
                    }
                    updateScore(combinedCol.scoreToAdd);
                }
                
                if (moved) {
                    renderBoard();
                }
                return moved;
            }

            function moveLeft() {
                let moved = false;
                // Clear any previous merge tracking for animation purposes
                mergedPositions = new Set();
                
                for (let r = 0; r < GRID_SIZE; r++) {
                    let currentRow = board[r];
                    let slidRow = slide(currentRow);
                    let combinedRow = combine(slidRow);
                    let finalRow = slide(combinedRow.arr); // Slide again

                    if (currentRow.join(',') !== finalRow.join(',')) { // Simple array comparison
                        moved = true;
                    }
                    
                    // Track merges for animation purposes
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (finalRow[c] && finalRow[c] !== currentRow[c] && currentRow[c] !== 0) {
                            mergedPositions.add(`${r},${c}`);
                        }
                    }
                    
                    board[r] = finalRow;
                    updateScore(combinedRow.scoreToAdd);
                }
                
                if (moved) {
                    renderBoard();
                }
                return moved;
            }

            function moveRight() {
                let moved = false;
                // Clear any previous merge tracking for animation purposes
                mergedPositions = new Set();
                
                for (let r = 0; r < GRID_SIZE; r++) {
                    let currentRow = board[r].slice().reverse(); // Get row and reverse
                    let slidRow = slide(currentRow);
                    let combinedRow = combine(slidRow);
                    let finalRow = slide(combinedRow.arr).reverse(); // Slide, combine, slide, reverse back

                    if (board[r].join(',') !== finalRow.join(',')) {
                        moved = true;
                    }
                    
                    // Track merges for animation purposes
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (finalRow[c] && finalRow[c] !== board[r][c] && board[r][c] !== 0) {
                            mergedPositions.add(`${r},${c}`);
                        }
                    }
                    
                    board[r] = finalRow;
                    updateScore(combinedRow.scoreToAdd);
                }
                
                if (moved) {
                    renderBoard();
                }
                return moved;
            }


            // --- Helper Functions for Moves ---

            // Slides tiles in an array (representing a row or column) to the beginning
            function slide(arr) {
                // Filter out zeros
                let filteredArr = arr.filter(num => num !== 0);
                // Create a new array with the non-zero numbers followed by zeros
                let newArr = Array(GRID_SIZE).fill(0);
                filteredArr.forEach((num, index) => {
                    newArr[index] = num;
                });
                return newArr;
            }

            // Combines adjacent identical tiles in an array
            function combine(arr) {
                let scoreToAdd = 0;
                let mergedIndices = []; // Track which indices had merges
                
                for (let i = 0; i < GRID_SIZE - 1; i++) {
                    if (arr[i] !== 0 && arr[i] === arr[i+1]) {
                        arr[i] *= 2; // Combine tile
                        arr[i+1] = 0; // Remove the second tile
                        scoreToAdd += arr[i]; // Add to score
                        
                        // Track the position where the merge happened
                        mergedIndices.push(i);
                        
                        // Optional: Check for win condition here
                        if (arr[i] === 2048) {
                            // Trigger win state (optional, game can continue)
                            console.log("You reached 2048!");
                            setTimeout(() => {
                                showMessage("You Win! Continue playing?");
                            }, 500);
                        }
                    }
                }
                
                return { arr, scoreToAdd };
            }

            // --- Game State Checks ---

            function isBoardFull() {
                return !board.flat().includes(0); // Check if any cell is 0
            }

            function canMoveCheck() {
                 // Check horizontally
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE - 1; c++) {
                        if (board[r][c] === board[r][c+1]) return true; // Can merge horizontally
                    }
                }
                // Check vertically
                for (let c = 0; c < GRID_SIZE; c++) {
                    for (let r = 0; r < GRID_SIZE - 1; r++) {
                        if (board[r][c] === board[r+1][c]) return true; // Can merge vertically
                    }
                }
                return false; // No possible merges
            }

            function checkGameOver() {
                // Game is over if the board is full AND no more moves are possible
                if (isBoardFull() && !canMoveCheck()) {
                    isGameOver = true;
                    return true;
                }
                return false;
            }

            function endGame() {
                console.log("Game Over!");
                showMessage("Game Over!");
            }

            function showMessage(msg) {
                 messageText.textContent = msg;
                 messageContainer.classList.add('active'); // Make overlay visible
            }


            // --- Score Management ---

            function updateScore(points) {
                score += points;
                scoreElement.textContent = score;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('bestScore2048', bestScore);
                    updateBestScoreDisplay();
                }
            }

            function updateBestScoreDisplay() {
                bestScoreElement.textContent = bestScore;
            }

            // --- Start the Game ---
            setupInput();
            startGame();

        });
    </script>
