<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crossy Road</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; touch-action:none; }
#wrap { position:relative; }
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
#dpad { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:none; user-select:none; -webkit-user-select:none; }
.drow { display:flex; justify-content:center; }
.dbtn { width:60px; height:60px; background:rgba(0,0,0,0.45); border:2px solid rgba(255,255,255,0.35); border-radius:10px; color:#fff; font-size:24px; line-height:60px; text-align:center; margin:3px; cursor:pointer; touch-action:none; -webkit-tap-highlight-color:transparent; }
</style>
</head>
<body>
<div id="wrap">
<canvas id="gc" width="800" height="600"></canvas>
<div id="dpad">
  <div class="drow"><div class="dbtn" id="dbu">▲</div></div>
  <div class="drow"><div class="dbtn" id="dbl">◀</div><div class="dbtn" id="dbd">▼</div><div class="dbtn" id="dbr">▶</div></div>
</div>
</div>
<script>
// ===== CROSSY ROAD =====
// Coordinate system: row numbers INCREASE going NORTH (forward).
// worldToScreenY(row) = (cameraTopRow - row) * CELL
// Player starts at row 0. Moving forward (up on screen) = gridY++.
// Score = gridY.

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const dpad = document.getElementById('dpad');

function fitCanvas() {
  const s = Math.min(window.innerWidth / 800, window.innerHeight / 600, 1);
  canvas.style.width  = (800 * s) + 'px';
  canvas.style.height = (600 * s) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

const W = 800, H = 600;
const CELL = 64;
const COLS = 13;
const START_COL = 6;
const SCREEN_ROW = 7;  // which screen row the player sits on (0=top)
const MOVE_FRAMES = 7;

const C = {
  g1:'#4a7c3f', g2:'#3d6b34', g3:'#56894a',
  road:'#2a2a2a', roadEdge:'#444', roadLine:'#f5c518',
  river:'#1a4fa0', riverDeep:'#0e3070', riverShim:'#3077d4',
  log:'#8B5e3c', logD:'#6b4a2c', logL:'#a07040',
  track:'#555', tie:'#5a3a1a', rail:'#aaa',
  trainB:'#888', trainC:'#555', trainLt:'#ffee88', trainW:'#ff3300',
  car:['#e63946','#457b9d','#f4a261','#2a9d8f','#9b5de5'],
  carWin:'rgba(0,0,0,0.45)',
  ply:'#3ec43e', plyB:'#2a9a2a', plyBelly:'#90d060', plyDark:'#1e6e1e',
  plyEye:'#ffdd00', plyPup:'#111', plyTongue:'#ff2244',
  tree:'#2d6a1f', treeD:'#1e4d15', trunk:'#5a3a1a',
  hud:'rgba(0,0,0,0.6)', gold:'#FFD700', white:'#ffffff', score:'#ffee88'
};

// ===== SHOP DATA =====
const SKIN_COLORS = {
  green:  {b:'#3ec43e',d:'#2a9a2a',bl:'#90d060',dk:'#1e6e1e',eye:'#ffdd00',pu:'#111',tg:'#ff2244'},
  blue:   {b:'#2299ee',d:'#1166cc',bl:'#66bbff',dk:'#0a4499',eye:'#ffdd00',pu:'#111',tg:'#ff2244'},
  red:    {b:'#dd4422',d:'#bb2200',bl:'#ff8866',dk:'#881100',eye:'#ffee44',pu:'#222',tg:'#ff9900'},
  gold:   {b:'#ffcc00',d:'#cc9900',bl:'#ffee88',dk:'#996600',eye:'#333',   pu:'#000',tg:'#ff4400'},
  purple: {b:'#9944cc',d:'#772299',bl:'#cc88ff',dk:'#441166',eye:'#ffee00',pu:'#111',tg:'#ff2255'},
  shadow: {b:'#334466',d:'#223355',bl:'#6688aa',dk:'#111c2a',eye:'#ff4444',pu:'#800',tg:'#ff2244'},
};
const SKINS = [
  {id:'green',  name:'Green Lizard',  price:0,   desc:'The original'},
  {id:'blue',   name:'Blue Gecko',    price:50,  desc:'Cool & slippery'},
  {id:'red',    name:'Red Dragon',    price:100, desc:'Born in fire'},
  {id:'gold',   name:'Gold Lizard',   price:200, desc:'Bling bling'},
  {id:'purple', name:'Chameleon',     price:150, desc:'Now you see me...'},
  {id:'shadow', name:'Shadow Lizard', price:175, desc:'Creature of the night'},
];
const ABILITIES = [
  {id:'headstart',  name:'Head Start',    price:50,  desc:'Begin 5 rows ahead'},
  {id:'shield',     name:'Shield',        price:80,  desc:'Survive one hit per run'},
  {id:'dblcoins',   name:'Double Coins',  price:120, desc:'Earn 2x coins per run'},
  {id:'slowscroll', name:'Slow Scroll',   price:100, desc:'Half scroll speed'},
];

// ===== STATE =====
let gs = 'title';
let fc = 0;
let hs = 0;

// Shop/coin state
let coins = 0;
let ownedSkins = ['green'];
let activeSkin = 'green';
let ownedAbils = [];
let activeAbils = [];
let shopTab = 'skins';
let runCoins = 0;
let shopScroll = 0;  // reserved for future scroll

let pl = {};
let lanes = [];
let cameraTopRow = SCREEN_ROW;  // the world row shown at the very top of the screen
let maxNorth = 0;               // furthest north row player has reached (= score)
let nextGenRow = 0;

// Cluster generator state
let genType = 'grass', genLeft = 0, hazStreak = 0;

const keys = {};
let kbuf = null;
let particles = [], shake = {x:0,y:0,n:0,d:0};
let deathTimer = 0;
let scrollRate = 0.0020;  // rows per frame auto-scroll speed

// ===== AUDIO =====
let ac = null;
function initAc() { if (!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); }

function snd(type) {
  if (!ac) return;
  const t = ac.currentTime;
  try {
    if (type === 'hop') {
      const o=ac.createOscillator(), g=ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.frequency.setValueAtTime(380,t); o.frequency.exponentialRampToValueAtTime(620,t+0.04);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.07);
      o.start(t); o.stop(t+0.07);
    } else if (type === 'hit') {
      const buf=ac.createBuffer(1,ac.sampleRate*0.2,ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/3500);
      const s=ac.createBufferSource(), f=ac.createBiquadFilter();
      f.type='lowpass'; f.frequency.value=400;
      s.buffer=buf; s.connect(f); f.connect(ac.destination); s.start(t);
      const o=ac.createOscillator(), g=ac.createGain();
      o.frequency.value=55; g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.15);
    } else if (type === 'splash') {
      const buf=ac.createBuffer(1,ac.sampleRate*0.4,ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/2800);
      const s=ac.createBufferSource(), f=ac.createBiquadFilter();
      f.type='bandpass'; f.frequency.value=900; f.Q.value=0.5;
      s.buffer=buf; s.connect(f); f.connect(ac.destination); s.start(t);
    } else if (type === 'horn') {
      [[220,0.28],[330,0.18]].forEach(([fr,vol])=>{
        const o=ac.createOscillator(), g=ac.createGain();
        o.type='sawtooth'; o.frequency.value=fr;
        g.gain.setValueAtTime(vol,t); g.gain.setValueAtTime(vol,t+0.35); g.gain.exponentialRampToValueAtTime(0.001,t+0.55);
        o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.55);
      });
    } else if (type === 'chime') {
      [523,659,784].forEach((fr,i)=>{
        const o=ac.createOscillator(), g=ac.createGain(), st=t+i*0.12;
        g.gain.setValueAtTime(0.18,st); g.gain.exponentialRampToValueAtTime(0.001,st+0.35);
        o.frequency.value=fr; o.connect(g); g.connect(ac.destination); o.start(st); o.stop(st+0.35);
      });
    }
  } catch(e) {}
}

// ===== PARTICLES =====
function addPfx(x, y, col, n, spd, life) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=spd*(0.4+Math.random()*0.6);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life,ml:life,sz:3+Math.random()*4});
  }
}
function updPfx() {
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawPfx() {
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.ml; ctx.fillStyle=p.col;
    ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  });
  ctx.globalAlpha=1;
}

// ===== SHAKE =====
function addShk(n,d) { shake.n=n; shake.d=d; }
function updShk() {
  if(shake.d>0){shake.x=(Math.random()-.5)*shake.n;shake.y=(Math.random()-.5)*shake.n;shake.d--;}
  else{shake.x=0;shake.y=0;}
}

// ===== UTILS =====
function lerp(a,b,t){return a+(b-a)*t;}
function w2s(row){return(cameraTopRow-row)*CELL;}  // world row → screen Y
function seed(row,col){return Math.abs(Math.sin(row*127.1+col*311.7)*43758.5453)%1;}
function getLane(row){return lanes.find(l=>l.row===row)||null;}
function diff(){return Math.min(1,maxNorth/35);}

// ===== GENERATION =====
function mkTrees(row) {
  const t=[];
  for(let c=0;c<COLS;c++) {
    if(c===START_COL) continue;
    if(seed(row,c)<0.22) t.push(c);
  }
  return t;
}

function mkCars(dir) {
  const d=diff(), count=2+Math.floor(d*3);
  const spd=(1.5+d*2.5)*dir, gap=W/count;
  const arr=[];
  for(let i=0;i<count;i++) {
    arr.push({x:i*gap+Math.random()*gap*0.5, w:CELL*1.8, h:CELL-14,
      spd, col:C.car[Math.floor(Math.random()*C.car.length)]});
  }
  return arr;
}

function mkLogs(dir) {
  const d=diff(), count=2+Math.floor(Math.random()*2);
  const spd=(1.0+d*1.5)*dir, gap=W/count;
  const arr=[];
  for(let i=0;i<count;i++) {
    const w=CELL*(1.5+Math.random()*1.2);
    arr.push({x:i*gap+Math.random()*gap*0.3, w, h:CELL-12, spd});
  }
  return arr;
}

function genLane(row) {
  if(row<=4) {
    return {type:'grass',row,dir:1,ent:[],trees:row<=1?[]:mkTrees(row),
      warnTimer:0,warnOn:false,trainSpd:0};
  }
  // Pick cluster type
  if(genLeft<=0) {
    const d=diff(), r=Math.random();
    let type,size;
    if(hazStreak>=4||r<0.27){type='grass';size=1+Math.floor(Math.random()*2);hazStreak=0;}
    else if(r<0.60){type='road';size=2+Math.floor(Math.random()*2);hazStreak++;}
    else if(r<0.82){
      type=(genType==='river')?'grass':'river';
      size=type==='grass'?1:1+Math.floor(Math.random()*(1+Math.floor(d*2)));
      if(type==='grass') hazStreak=0; else hazStreak++;
    } else {type='track';size=1;hazStreak++;}
    genType=type; genLeft=size-1;
  } else { genLeft--; }

  const dir=Math.random()<0.5?1:-1;
  const lane={type:genType,row,dir,ent:[],trees:[],warnTimer:0,warnOn:false,trainSpd:0};
  if(lane.type==='grass') lane.trees=mkTrees(row);
  else if(lane.type==='road') lane.ent=mkCars(dir);
  else if(lane.type==='river') lane.ent=mkLogs(dir);
  else if(lane.type==='track') {
    lane.trainSpd=(6+diff()*6)*dir;
    lane.warnTimer=150+Math.floor(Math.random()*180);
    lane.warnOn=false;
  }
  return lane;
}

function genUpTo(targetRow) {
  while(nextGenRow<=targetRow) { lanes.push(genLane(nextGenRow)); nextGenRow++; }
}

function cull() {
  // Keep lanes that are still visible or ahead of player
  const minRow=Math.floor(cameraTopRow-Math.ceil(H/CELL)-2);
  lanes=lanes.filter(l=>l.row>=minRow);
}

// ===== PLAYER INIT =====
function resetPl() {
  pl={
    gridX:START_COL, gridY:0,
    px:START_COL*CELL,           // current draw pixel X
    py:w2s(0),                   // current draw pixel Y (recalc each draw)
    prevPx:START_COL*CELL,
    prevPy:0,
    tgX:START_COL, tgY:0,        // target grid pos during move anim
    moving:false, mt:0,          // move timer
    onLog:null,
    alive:true, deathType:'',
    facing:'up', flash:0,
    shields:0, invincible:0
  };
}

function initGame() {
  lanes=[]; nextGenRow=0;
  genType='grass'; genLeft=0; hazStreak=0;
  particles=[]; deathTimer=0; runCoins=0;
  maxNorth=0; scrollRate=activeAbils.includes('slowscroll')?0.0010:0.0020;
  cameraTopRow=SCREEN_ROW;
  resetPl();
  // Apply abilities
  if(activeAbils.includes('headstart')) {
    pl.gridY=5; pl.tgY=5; maxNorth=5; cameraTopRow=5+SCREEN_ROW;
    pl.prevPy=w2s(5);  // fix prevPy so first-move animation starts correctly
  }
  if(activeAbils.includes('shield')) pl.shields=1;
  genUpTo(55);
}

// ===== INPUT =====
document.addEventListener('keydown',e=>{
  if(keys[e.key]) return;
  keys[e.key]=true;
  initAc();
  if(gs==='title'){startGame();return;}
  if(gs==='gameOver'){
    if(e.key==='r'||e.key==='R'||e.key==='Enter'||e.key===' '){startGame();return;}
    if(e.key==='s'||e.key==='S'){gs='shop';shopTab='skins';return;}
  }
  if(gs==='playing'){
    const m={ArrowUp:'up',ArrowDown:'dn',ArrowLeft:'lt',ArrowRight:'rt',
             w:'up',s:'dn',a:'lt',d:'rt',W:'up',S:'dn',A:'lt',D:'rt'};
    if(m[e.key]) kbuf=m[e.key];
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('click',e=>{
  initAc();
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  if(gs==='title'){startGame();}
  else if(gs==='gameOver'){
    // Play Again button
    if(inBtn(mx,my,192,368,196,48)){startGame();return;}
    // Shop button
    if(inBtn(mx,my,452,368,172,48)){gs='shop';shopTab='skins';return;}
    // Default: click anywhere = play again
    startGame();
  } else if(gs==='shop'){
    handleShopClick(mx,my);
  }
});

function startGame(){initGame();gs='playing';}

// ===== TOUCH SUPPORT =====
function touchToCanvas(touch) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - r.left) * (W / r.width),
    y: (touch.clientY - r.top)  * (H / r.height)
  };
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAc();
  const {x:mx, y:my} = touchToCanvas(e.touches[0]);
  if(gs==='title'){startGame();return;}
  if(gs==='gameOver'){
    if(inBtn(mx,my,192,368,196,48)){startGame();return;}
    if(inBtn(mx,my,452,368,172,48)){gs='shop';shopTab='skins';return;}
    startGame();
  } else if(gs==='shop'){
    handleShopClick(mx,my);
  }
}, {passive:false});
function dpadDir(dir){initAc();if(gs==='playing')kbuf=dir;}
document.getElementById('dbu').addEventListener('touchstart',e=>{e.preventDefault();dpadDir('up');},{passive:false});
document.getElementById('dbd').addEventListener('touchstart',e=>{e.preventDefault();dpadDir('dn');},{passive:false});
document.getElementById('dbl').addEventListener('touchstart',e=>{e.preventDefault();dpadDir('lt');},{passive:false});
document.getElementById('dbr').addEventListener('touchstart',e=>{e.preventDefault();dpadDir('rt');},{passive:false});

// ===== PERSIST =====
function saveData() {
  localStorage.setItem('crossyRoad2', JSON.stringify(
    {hs, coins, ownedSkins, activeSkin, ownedAbils, activeAbils}
  ));
}
function loadData() {
  const d = JSON.parse(localStorage.getItem('crossyRoad2') || '{}');
  hs = d.hs || 0;
  coins = d.coins || 0;
  ownedSkins = d.ownedSkins || ['green'];
  activeSkin = d.activeSkin || 'green';
  ownedAbils = d.ownedAbils || [];
  activeAbils = d.activeAbils || [];
}
function saveHs() { saveData(); }  // keep alias used in tryMove

// ===== DEATH =====
function die(type) {
  if(!pl.alive) return;
  const sx=pl.px+CELL/2, sy=w2s(pl.gridY)+CELL/2;
  // Shield absorbs one car/train hit
  if((type==='car'||type==='train') && pl.shields > 0) {
    pl.shields--;
    addShk(6,15);
    addPfx(sx,sy,'#ffffff',10,4,22);
    addPfx(sx,sy,'#aaddff',6,2,18);
    pl.invincible=50;
    snd('hit');
    return;
  }
  pl.alive=false; pl.deathType=type;
  if(type==='car'||type==='train'){
    addShk(8,22);
    const sc=sk(); addPfx(sx,sy,sc.b,10,5,35); addPfx(sx,sy,sc.bl,8,3,28);
    snd('hit');
  } else {
    addShk(5,15);
    addPfx(sx,sy,C.riverDeep,10,3,38);
    addPfx(sx,sy,'#aaccff',6,2,28);
    snd('splash');
  }
  deathTimer=100;
  if(maxNorth>hs){hs=maxNorth;}
  // Award coins for this run
  runCoins = maxNorth * (activeAbils.includes('dblcoins') ? 2 : 1);
  coins += runCoins;
  saveData();
}

// ===== ENTITIES =====
function updEnts() {
  lanes.forEach(lane=>{
    if(lane.type==='road') {
      lane.ent.forEach(c=>{
        c.x+=c.spd;
        if(c.spd>0&&c.x>W+CELL) c.x=-c.w-CELL;
        if(c.spd<0&&c.x+c.w<-CELL) c.x=W+CELL;
      });
    } else if(lane.type==='river') {
      lane.ent.forEach(l=>{
        l.x+=l.spd;
        if(l.spd>0&&l.x>W+CELL*2) l.x=-l.w-CELL;
        if(l.spd<0&&l.x+l.w<-CELL*2) l.x=W+l.w+CELL;
      });
    } else if(lane.type==='track') {
      if(lane.ent.length===0) {
        lane.warnTimer--;
        if(lane.warnTimer<=0) {
          lane.warnOn=true;
          snd('horn');
          const fromLeft=lane.trainSpd>0;
          lane.ent.push({x:fromLeft?-CELL*6:W+CELL,w:CELL*5,h:CELL-6,spd:lane.trainSpd});
        }
      } else {
        lane.ent.forEach(tr=>{tr.x+=tr.spd;});
        lane.ent=lane.ent.filter(tr=>{
          if(tr.spd>0&&tr.x>W+CELL*6) return false;
          if(tr.spd<0&&tr.x+tr.w<-CELL*6) return false;
          return true;
        });
        if(lane.ent.length===0){
          lane.warnOn=false;
          lane.warnTimer=150+Math.floor(Math.random()*150);
        }
      }
    }
  });
}

// ===== PLAYER UPDATE =====
function tryMove(dir) {
  let dx=0,dy=0;
  if(dir==='up') dy=1;
  else if(dir==='dn') dy=-1;
  else if(dir==='lt') dx=-1;
  else if(dir==='rt') dx=1;

  const nx=pl.gridX+dx, ny=pl.gridY+dy;
  if(nx<0||nx>=COLS) return;
  if(ny<0) return;  // can't go south of start

  // Tree block
  const tl=getLane(ny);
  if(tl&&tl.type==='grass'&&tl.trees.includes(nx)) return;

  pl.prevPx=pl.px;
  pl.prevPy=w2s(pl.gridY);
  pl.gridX=nx; pl.gridY=ny;
  pl.tgX=nx; pl.tgY=ny;
  pl.moving=true; pl.mt=MOVE_FRAMES;
  pl.onLog=null;
  pl.facing=dir; pl.flash=6;
  snd('hop');

  // Score/camera update
  if(ny>maxNorth) {
    const prev=maxNorth;
    maxNorth=ny;
    if(maxNorth%10===0&&maxNorth>prev&&maxNorth>0) snd('chime');
    if(maxNorth>hs){hs=maxNorth;saveHs();}
  }

  genUpTo(maxNorth+50);
}

function chkRiver() {
  const lane=getLane(pl.gridY);
  if(!lane||lane.type!=='river'){pl.onLog=null;return;}
  const cx=pl.px+CELL/2;
  let found=null;
  for(const lg of lane.ent) {
    if(cx>=lg.x+5&&cx<=lg.x+lg.w-5){found=lg;break;}
  }
  if(found) pl.onLog=found;
  else die('water');
}

function updPl() {
  if(!pl.alive) return;

  if(pl.moving) {
    pl.mt--;
    const prog=1-pl.mt/MOVE_FRAMES;
    pl.px=lerp(pl.prevPx,pl.tgX*CELL,prog);
    if(pl.mt<=0) {
      pl.moving=false;
      pl.px=pl.tgX*CELL;
      chkRiver();
      if(kbuf){const k=kbuf;kbuf=null;tryMove(k);}
    }
  } else {
    // Ride log
    if(pl.onLog) {
      pl.px+=pl.onLog.spd;
      pl.gridX=Math.round(pl.px/CELL);
      if(pl.px<-CELL||pl.px>W) die('water');
    }
    if(kbuf){const k=kbuf;kbuf=null;tryMove(k);}
  }
  if(pl.flash>0) pl.flash--;
}

// ===== COLLISION =====
function chkCollision() {
  if(!pl.alive) return;
  if(pl.invincible > 0) { pl.invincible--; return; }
  const lane=getLane(pl.gridY);
  if(!lane) return;
  const margin=14;
  const pl_l=pl.px+margin, pl_r=pl.px+CELL-margin;
  const sy=w2s(pl.gridY);
  const pl_t=sy+margin, pl_b=sy+CELL-margin;

  if(lane.type==='road'||lane.type==='track') {
    for(const e of lane.ent) {
      const ey=sy+(CELL-e.h)/2;
      if(pl_l<e.x+e.w&&pl_r>e.x&&pl_t<ey+e.h&&pl_b>ey) {
        die(lane.type==='track'?'train':'car'); return;
      }
    }
  }
  // River: verify still on log each frame
  if(lane.type==='river'&&!pl.moving&&pl.onLog) {
    const cx=pl.px+CELL/2;
    if(cx<pl.onLog.x+5||cx>pl.onLog.x+pl.onLog.w-5) die('water');
  }
}

function chkScroll() {
  if(!pl.alive) return;
  const sy=w2s(pl.gridY);
  if(sy>H+CELL/2) die('water');
}

// ===== CAMERA =====
function updCam() {
  // Auto-scroll upward every frame
  cameraTopRow += scrollRate;
  // Gradually speed up as score increases
  const baseRate = activeAbils.includes('slowscroll') ? 0.0010 : 0.0020;
  scrollRate = Math.min(0.0050, baseRate + maxNorth * 0.000065);
  // If player is ahead of auto-scroll, snap camera to follow them
  const playerTarget = maxNorth + SCREEN_ROW;
  if(playerTarget > cameraTopRow) cameraTopRow = lerp(cameraTopRow, playerTarget, 0.15);
}

// ===== SKIN HELPER =====
function sk() { return SKIN_COLORS[activeSkin] || SKIN_COLORS.green; }

// ===== DRAW HELPERS =====
function rrect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arc(x+w-r,y+r,r,-Math.PI/2,0);
  ctx.lineTo(x+w,y+h-r);
  ctx.arc(x+w-r,y+h-r,r,0,Math.PI/2);
  ctx.lineTo(x+r,y+h);
  ctx.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);
  ctx.lineTo(x,y+r);
  ctx.arc(x+r,y+r,r,Math.PI,-Math.PI/2);
  ctx.closePath();
}

// ===== DRAW LANES =====
function drawGrass(lane,sy) {
  ctx.fillStyle=C.g1; ctx.fillRect(0,sy,W,CELL);
  ctx.fillStyle=C.g2;
  ctx.fillRect(0,sy+Math.floor(seed(lane.row,0)*(CELL-4)),W,2);
  ctx.fillRect(0,sy+Math.floor(seed(lane.row,1)*(CELL-4)),W,2);
  ctx.fillStyle=C.g3;
  ctx.fillRect(0,sy+Math.floor(seed(lane.row,2)*(CELL-4)),W,1);

  lane.trees.forEach(c=>{
    const tx=c*CELL;
    ctx.fillStyle=C.trunk;
    ctx.fillRect(tx+CELL/2-5,sy+CELL-18,10,18);
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(tx+CELL/2,sy+CELL-5,14,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.treeD;
    ctx.beginPath(); ctx.arc(tx+CELL/2,sy+CELL/2-4,21,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.tree;
    ctx.beginPath(); ctx.arc(tx+CELL/2-3,sy+CELL/2-8,17,0,Math.PI*2); ctx.fill();
  });
}

function drawRoad(lane,sy) {
  ctx.fillStyle=C.road; ctx.fillRect(0,sy,W,CELL);
  ctx.fillStyle=C.roadEdge;
  ctx.fillRect(0,sy,W,2); ctx.fillRect(0,sy+CELL-2,W,2);
  ctx.fillStyle=C.roadLine;
  for(let x=0;x<W;x+=28) ctx.fillRect(x,sy+CELL/2-1,14,3);

  lane.ent.forEach(car=>{
    const cy=sy+(CELL-car.h)/2;
    ctx.fillStyle=car.col; ctx.fillRect(car.x,cy,car.w,car.h);
    ctx.fillStyle=C.carWin;
    ctx.fillRect(car.x+car.w*0.22,cy+car.h*0.18,car.w*0.56,car.h*0.46);
    ctx.fillStyle='#111';
    ctx.fillRect(car.x+4,cy+car.h-5,10,5);
    ctx.fillRect(car.x+car.w-14,cy+car.h-5,10,5);
  });
}

function drawRiver(lane,sy) {
  ctx.fillStyle=C.river; ctx.fillRect(0,sy,W,CELL);
  ctx.strokeStyle=C.riverShim; ctx.lineWidth=1.5; ctx.globalAlpha=0.4;
  for(let w=0;w<3;w++) {
    const yo=sy+8+w*18;
    ctx.beginPath();
    for(let x=0;x<=W;x+=4) {
      const wy=yo+Math.sin((x+fc*1.5+w*50)*0.05)*4;
      x===0?ctx.moveTo(x,wy):ctx.lineTo(x,wy);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.lineWidth=1;

  lane.ent.forEach(log=>{
    const ly=sy+(CELL-log.h)/2;
    ctx.fillStyle=C.log; rrect(log.x,ly,log.w,log.h,6); ctx.fill();
    ctx.strokeStyle=C.logD; ctx.lineWidth=1.5;
    const gc=Math.floor(log.w/20);
    for(let i=1;i<gc;i++) {
      const gx=log.x+(log.w/gc)*i;
      ctx.beginPath(); ctx.moveTo(gx,ly+3); ctx.lineTo(gx,ly+log.h-3); ctx.stroke();
    }
    ctx.fillStyle=C.logL; ctx.globalAlpha=0.25;
    rrect(log.x+3,ly+3,log.w-6,log.h*0.35,3); ctx.fill();
    ctx.globalAlpha=1; ctx.lineWidth=1;
  });
}

function drawTrack(lane,sy) {
  ctx.fillStyle=C.track; ctx.fillRect(0,sy,W,CELL);
  ctx.fillStyle=C.tie;
  for(let x=-6;x<W+20;x+=46) ctx.fillRect(x,sy+4,14,CELL-8);
  ctx.fillStyle=C.rail;
  ctx.fillRect(0,sy+14,W,5); ctx.fillRect(0,sy+CELL-19,W,5);

  if(lane.warnOn&&fc%20<10) {
    ctx.fillStyle=C.trainW;
    [16,W-16].forEach(cx=>{
      ctx.beginPath(); ctx.arc(cx,sy+CELL/2,10,0,Math.PI*2); ctx.fill();
    });
    ctx.fillStyle='#fff'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText('!',16,sy+CELL/2+3); ctx.fillText('!',W-16,sy+CELL/2+3);
    ctx.textAlign='left';
  }

  lane.ent.forEach(tr=>{
    const ty=sy+(CELL-tr.h)/2, fl=tr.spd>0;
    ctx.fillStyle=C.trainB; ctx.fillRect(tr.x,ty,tr.w,tr.h);
    const cabX=fl?tr.x+tr.w-CELL*0.8:tr.x;
    ctx.fillStyle=C.trainC; ctx.fillRect(cabX,ty,CELL*0.8,tr.h);
    ctx.fillStyle=C.trainLt;
    const lx=fl?tr.x+tr.w-8:tr.x+8;
    ctx.beginPath(); ctx.arc(lx,ty+tr.h/2,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.carWin;
    for(let i=0;i<3;i++) {
      const wx=tr.x+(fl?CELL*0.5:CELL*0.4)+i*CELL*0.8;
      if(wx>tr.x&&wx+14<tr.x+tr.w) ctx.fillRect(wx,ty+4,14,tr.h-8);
    }
  });
}

// ===== DRAW PLAYER =====
function drawPlayer() {
  // Squash-on-car death
  if(!pl.alive&&deathTimer>70&&pl.deathType==='car') {
    const sy=w2s(pl.gridY);
    ctx.fillStyle=C.ply;
    ctx.beginPath(); ctx.ellipse(pl.px+CELL/2,sy+CELL-6,CELL/2-4,5,0,0,Math.PI*2); ctx.fill();
    return;
  }
  if(!pl.alive) ctx.globalAlpha=Math.max(0,deathTimer/100);

  // Compute draw center
  const cx=pl.px+CELL/2;
  let cy;
  if(pl.moving) {
    cy=lerp(pl.prevPy,w2s(pl.tgY),1-pl.mt/MOVE_FRAMES)+CELL/2;
  } else {
    cy=w2s(pl.gridY)+CELL/2;
  }

  // Rotation by facing direction
  const rots={up:0,dn:Math.PI,lt:-Math.PI/2,rt:Math.PI/2};
  const rot=rots[pl.facing]||0;

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(rot);

  // Hop squish/stretch animation
  if(pl.moving) {
    const prog=1-pl.mt/MOVE_FRAMES;
    const squeeze=1+Math.sin(prog*Math.PI)*0.22;
    ctx.scale(1/squeeze,squeeze);
  }

  // Flash on hop
  if(pl.flash>0) {
    ctx.globalAlpha=(ctx.globalAlpha)*(1-(pl.flash/6)*0.5);
  }

  const s=sk();
  // Invincibility flash (shield hit)
  if(pl.invincible>0&&Math.floor(pl.invincible/4)%2===0) {
    ctx.globalAlpha=0.3;
  }

  // --- TAIL ---
  ctx.fillStyle=s.d;
  ctx.beginPath();
  ctx.moveTo(-5,10);
  ctx.bezierCurveTo(-9,18,-6,26,0,30);
  ctx.bezierCurveTo(6,26,9,18,5,10);
  ctx.closePath();
  ctx.fill();
  // Tail stripe
  ctx.fillStyle=s.bl;
  ctx.beginPath();
  ctx.moveTo(-2,12);
  ctx.bezierCurveTo(-3,20,-1,27,0,29);
  ctx.bezierCurveTo(1,27,3,20,2,12);
  ctx.closePath();
  ctx.fill();

  // --- BODY ---
  ctx.fillStyle=s.d;
  ctx.beginPath(); ctx.ellipse(0,2,13,17,0,0,Math.PI*2); ctx.fill();
  // Belly
  ctx.fillStyle=s.bl;
  ctx.beginPath(); ctx.ellipse(0,3,7,11,0,0,Math.PI*2); ctx.fill();
  // Dorsal ridge dots
  ctx.fillStyle=s.dk;
  [-10,-4,2,8].forEach(ry=>{
    ctx.beginPath(); ctx.arc(0,ry,2,0,Math.PI*2); ctx.fill();
  });

  // --- LEGS (4 stubs) ---
  ctx.fillStyle=s.d;
  [[-14,-5,6,3.5,-0.4],[14,-5,6,3.5,0.4],[-15,7,6,3,0.3],[15,7,6,3,-0.3]].forEach(([lx,ly,rx,ry,ang])=>{
    ctx.beginPath(); ctx.ellipse(lx,ly,rx,ry,ang,0,Math.PI*2); ctx.fill();
  });
  // Tiny feet
  ctx.fillStyle=s.dk;
  [[-20,-7],[20,-7],[-21,9],[21,9]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.arc(fx,fy,2.5,0,Math.PI*2); ctx.fill();
  });

  // --- HEAD ---
  ctx.fillStyle=s.d;
  ctx.beginPath(); ctx.ellipse(0,-15,10,12,0,0,Math.PI*2); ctx.fill();
  // Snout
  ctx.fillStyle=s.b;
  ctx.beginPath(); ctx.ellipse(0,-22,6,5,0,0,Math.PI*2); ctx.fill();
  // Nostril dots
  ctx.fillStyle=s.dk;
  ctx.beginPath(); ctx.arc(-3,-23,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3,-23,1.2,0,Math.PI*2); ctx.fill();

  // --- EYES ---
  ctx.fillStyle=s.dk;
  ctx.beginPath(); ctx.arc(-6,-14,5.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-14,5.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=s.eye;
  ctx.beginPath(); ctx.arc(-6,-14,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-14,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=s.pu;
  ctx.beginPath(); ctx.ellipse(-6,-14,1.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6,-14,1.5,3,0,0,Math.PI*2); ctx.fill();

  // Shield indicator
  if(pl.shields>0) {
    ctx.strokeStyle='#88eeff'; ctx.lineWidth=2; ctx.globalAlpha=0.7+Math.sin(fc*0.2)*0.3;
    ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth=1; ctx.globalAlpha=1;
  }

  // --- TONGUE (flicks when moving) ---
  if(pl.moving||pl.flash>2) {
    const flick=pl.moving?Math.sin((1-pl.mt/MOVE_FRAMES)*Math.PI)*3:0;
    ctx.strokeStyle=s.tg; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,-27); ctx.lineTo(0,-33+flick); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0,-33+flick); ctx.lineTo(-4,-37+flick);
    ctx.moveTo(0,-33+flick); ctx.lineTo(4,-37+flick);
    ctx.stroke();
    ctx.lineWidth=1;
  }

  ctx.restore();
  ctx.globalAlpha=1;
}

function drawHUD() {
  ctx.fillStyle=C.hud; ctx.fillRect(0,0,W,44);
  ctx.fillStyle=C.score; ctx.font='bold 22px monospace'; ctx.textAlign='left';
  ctx.fillText('Score: '+maxNorth,14,30);
  ctx.textAlign='center';
  ctx.fillStyle=C.gold; ctx.font='bold 18px monospace';
  ctx.fillText('🪙 '+coins,W/2,28);
  ctx.textAlign='right'; ctx.fillStyle=C.score; ctx.font='bold 22px monospace';
  ctx.fillText('Best: '+hs,W-14,30); ctx.textAlign='left';
}

function drawAllLanes() {
  // cameraTopRow is the world row shown at screen Y=0
  // bottomRow: screen Y=H → row = cameraTopRow - H/CELL
  const top=Math.ceil(cameraTopRow)+1;
  const bot=Math.floor(cameraTopRow-H/CELL)-1;
  for(let row=bot;row<=top;row++) {
    const sy=w2s(row);
    if(sy<-CELL||sy>H+CELL) continue;
    const lane=getLane(row);
    if(!lane){ctx.fillStyle=C.g1;ctx.fillRect(0,sy,W,CELL);}
    else if(lane.type==='grass') drawGrass(lane,sy);
    else if(lane.type==='road') drawRoad(lane,sy);
    else if(lane.type==='river') drawRiver(lane,sy);
    else if(lane.type==='track') drawTrack(lane,sy);
  }
}

function drawMiniLizard(cx,cy,skinId,scale) {
  const s=SKIN_COLORS[skinId]||SKIN_COLORS.green;
  scale=scale||1;
  ctx.save(); ctx.translate(cx,cy); ctx.scale(scale,scale);
  ctx.fillStyle=s.d;
  ctx.beginPath(); ctx.moveTo(-4,8); ctx.bezierCurveTo(-7,14,-5,20,0,23);
  ctx.bezierCurveTo(5,20,7,14,4,8); ctx.closePath(); ctx.fill();
  ctx.fillStyle=s.d; ctx.beginPath(); ctx.ellipse(0,1,10,13,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=s.bl; ctx.beginPath(); ctx.ellipse(0,2,5,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=s.d;
  [[-11,-4,5,2.5],[11,-4,5,2.5],[-12,5,5,2],[12,5,5,2]].forEach(([lx,ly,rx,ry])=>{
    ctx.beginPath(); ctx.ellipse(lx,ly,rx,ry,0,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle=s.d; ctx.beginPath(); ctx.ellipse(0,-12,8,9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=s.b; ctx.beginPath(); ctx.ellipse(0,-18,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=s.eye;
  ctx.beginPath(); ctx.arc(-5,-11,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-11,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=s.pu;
  ctx.beginPath(); ctx.ellipse(-5,-11,1,2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5,-11,1,2,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawShop() {
  // Background
  ctx.fillStyle='#0d1220'; ctx.fillRect(0,0,W,H);
  // Header
  ctx.fillStyle='#1a2540'; ctx.fillRect(0,0,W,65);
  ctx.fillStyle=C.gold; ctx.font='bold 30px monospace'; ctx.textAlign='left';
  ctx.fillText('SHOP',20,42);
  ctx.fillStyle=C.gold; ctx.font='bold 20px monospace'; ctx.textAlign='right';
  ctx.fillText('🪙 '+coins,W-20,42);
  ctx.textAlign='left';
  // Tabs
  const tabs=[{id:'skins',label:'SKINS'},{id:'abilities',label:'ABILITIES'}];
  tabs.forEach((tab,i)=>{
    const tx=20+i*180, active=shopTab===tab.id;
    ctx.fillStyle=active?'#2a4080':'#131e30';
    ctx.fillRect(tx,68,165,36);
    if(active){ctx.strokeStyle=C.gold;ctx.lineWidth=2;ctx.strokeRect(tx,68,165,36);ctx.lineWidth=1;}
    ctx.fillStyle=active?C.gold:'#888'; ctx.font='bold 16px monospace'; ctx.textAlign='center';
    ctx.fillText(tab.label,tx+82,91); ctx.textAlign='left';
  });
  // Items
  const items=shopTab==='skins'?SKINS:ABILITIES;
  const cols=3, cardW=240, cardH=155, padX=20, padY=110;
  items.forEach((item,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const x=padX+col*(cardW+10), y=padY+row*(cardH+10);
    const owned=shopTab==='skins'?ownedSkins.includes(item.id):ownedAbils.includes(item.id);
    const active=shopTab==='skins'?(activeSkin===item.id):(activeAbils.includes(item.id));
    // Card bg
    ctx.fillStyle=active?'#1e3050':'#131828';
    ctx.fillRect(x,y,cardW,cardH);
    ctx.strokeStyle=active?C.gold:(owned?'#446':'#222');
    ctx.lineWidth=active?2:1; ctx.strokeRect(x,y,cardW,cardH); ctx.lineWidth=1;
    // Preview
    if(shopTab==='skins') {
      drawMiniLizard(x+60,y+62,item.id,1.4);
    } else {
      // Ability icon
      const icons={headstart:'▶▶',shield:'🛡',dblcoins:'🪙×2',slowscroll:'🐢'};
      ctx.font='28px monospace'; ctx.textAlign='center';
      ctx.fillText(icons[item.id]||'?',x+60,y+70); ctx.textAlign='left';
    }
    // Name + desc
    ctx.fillStyle=active?C.gold:'#ddd'; ctx.font='bold 14px monospace';
    ctx.fillText(item.name,x+cardW*0.42,y+28);
    ctx.fillStyle='#778'; ctx.font='11px monospace';
    ctx.fillText(item.desc,x+cardW*0.42,y+46);
    // Button
    let btnLabel, btnCol;
    if(!owned) { btnLabel='Buy '+item.price+'🪙'; btnCol=coins>=item.price?'#224422':'#2a1a1a'; }
    else if(shopTab==='skins') { btnLabel=active?'✓ Equipped':'Equip'; btnCol=active?'#333a22':'#1e2a3a'; }
    else { btnLabel=active?'✓ ACTIVE':'▶ ACTIVATE'; btnCol=active?'#1a4a1a':'#2a2a1a'; }
    drawBtn(btnLabel,x+cardW*0.38,y+cardH-38,cardW*0.58,30,btnCol,owned?'#aaffaa':'#aaa');
  });
  // Back button
  drawBtn('← BACK',20,H-56,140,40,'#2a1a1a','#ffaaaa');
  ctx.textAlign='left';
}

function handleShopClick(mx,my) {
  // Tabs
  if(inBtn(mx,my,20,68,165,36)) { shopTab='skins'; return; }
  if(inBtn(mx,my,200,68,165,36)) { shopTab='abilities'; return; }
  // Back
  if(inBtn(mx,my,20,H-56,140,40)) { gs='gameOver'; return; }
  // Item cards
  const items=shopTab==='skins'?SKINS:ABILITIES;
  const cols=3,cardW=240,cardH=155,padX=20,padY=110;
  items.forEach((item,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const x=padX+col*(cardW+10), y=padY+row*(cardH+10);
    const bx=x+cardW*0.38, by=y+cardH-38, bw=cardW*0.58, bh=30;
    if(!inBtn(mx,my,bx,by,bw,bh)) return;
    const owned=shopTab==='skins'?ownedSkins.includes(item.id):ownedAbils.includes(item.id);
    if(!owned) {
      if(coins>=item.price) {
        coins-=item.price;
        if(shopTab==='skins') { ownedSkins.push(item.id); activeSkin=item.id; }
        else { ownedAbils.push(item.id); activeAbils.push(item.id); } // auto-activate on buy
        saveData(); snd('chime');
      }
    } else if(shopTab==='skins') {
      activeSkin=item.id; saveData();
    } else {
      if(activeAbils.includes(item.id)) activeAbils=activeAbils.filter(a=>a!==item.id);
      else activeAbils.push(item.id);
      saveData();
    }
  });
}

// ===== UPDATE =====
function update() {
  fc++;
  updShk();
  if(gs==='title'||gs==='gameOver'||gs==='shop') return;

  if(!pl.alive) {
    updPfx(); deathTimer--;
    if(deathTimer<=0) gs='gameOver';
    return;
  }
  updEnts();
  updPl();
  updCam();
  genUpTo(Math.ceil(cameraTopRow) + 50);
  chkCollision();
  chkScroll();
  updPfx();
  cull();
}

// ===== DRAW =====
function draw() {
  dpad.style.display = gs==='playing' ? 'block' : 'none';
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(shake.x,shake.y);
  if(gs==='title') { drawTitle(); }
  else if(gs==='shop') { drawShop(); }
  else {
    drawAllLanes();
    drawPlayer();
    drawPfx();
    drawHUD();
    if(gs==='gameOver') drawGameOver();
  }
  ctx.restore();
}

// ===== LOOP =====
function loop() { update(); draw(); requestAnimationFrame(loop); }
loadData();
loop();
</script>
