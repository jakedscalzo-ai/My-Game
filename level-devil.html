<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Level Devil</title>
<style>
  @font-face {
  font-family: "DevilFont";
  src: url("JMH Typewriter.otf") format("truetype");
  font-weight: normal;
  font-style: normal;
}

body{
  margin:0;
  background:#102820;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: "DevilFont", Arial, sans-serif;
}

canvas{
  background:#CABA9C;
  border:4px solid #4D2D18;
  cursor:pointer;
}
</style>
</head>
<body>

<canvas id="game" width="960" height="480"></canvas>

<script>
/* ========= COLORS ========= */
const C={
  bg:"#102820",
  hunter:"#4C6444",
  khaki:"#CABA9C",
  ground:"#8A6240",
  dark:"#4D2D18",
  heart:"#C62828"
};

/* ========= CONSTANTS ========= */
const GROUND_Y=380;
const DOOR_W=40, DOOR_H=50, DOOR_Y=330;
const MAX_LIVES=3;

/* ========= CANVAS ========= */
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

/* ========= AUDIO (QUIET) ========= */
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function softTone(freq=220,dur=0.15,vol=0.06){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.type = "sine";
  o.frequency.value = freq;

  g.gain.value = vol;

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  g.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime + dur
  );
  o.stop(audioCtx.currentTime + dur);
}


/* ========= CAMERA ========= */
let camShake=0;

/* ========= INPUT ========= */
let keys={}, mouse={x:0,y:0,click:false};
document.addEventListener("keydown",e=>{
  keys[e.key]=true;
  if(state==="menu" && e.key==="Enter") startGame();
  if(e.key==="Escape"){
    if(state==="game") state="paused";
    else if(state==="paused") state="game";
  }
});
document.addEventListener("keyup",e=>keys[e.key]=false);
canvas.addEventListener("mousemove",e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=e.clientX-r.left;
  mouse.y=e.clientY-r.top;
});
canvas.addEventListener("mousedown",()=>mouse.click=true);
canvas.addEventListener("mouseup",()=>mouse.click=false);

/* ========= LEVELS ========= */
const levels=[
  {},
  { gapAnim:{x:300,w:0,max:140,trigger:120,speed:6} },
  { doors:[{x:600,fake:true},{x:880,fake:false}] },
  { spikes:[{x:420}] },
  { gaps:[{x:220,w:100},{x:420,w:100}] },
  { doors:[{x:520,fake:true},{x:880,fake:false}] },
  { ceilingSpike:true },
  { spikes:[{x:360}] },
  { gaps:[{x:240,w:120}],spikes:[{x:420}] },
  { movingDoor:true }
];

/* ========= PLAYER ========= */
let p={x:80,y:300,vx:0,vy:0,w:32,h:42,grounded:false,face:1};

/* ========= STATE ========= */
let state="menu";
let levelIndex=0;
let doorX=880;
let lives=MAX_LIVES;
let hearts=[];

/* ========= HEARTS ========= */
function resetHearts(){
  hearts=[];
  for(let i=0;i<MAX_LIVES;i++) hearts.push({x:20+i*28,y:20});
}
function breakHeart(){ hearts.pop(); }

/* ========= HELPERS ========= */
function rectHit(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

/* ========= FLOW ========= */
function startGame(){
  state="game";
  levelIndex=0;
  lives=MAX_LIVES;
  resetHearts();
  loadLevel();
}

function loadLevel(){
  p.x=80; p.y=300; p.vx=0; p.vy=0;
  doorX=880;
  const L=levels[levelIndex];
  if(L.gapAnim){
    L.gapAnim.w=0;
    L.gapAnim.started=false;
    L.gapAnim.shook=false;
  }
}

function die(){
  softTone(90,0.3,0.08); // death
  lives--;
  breakHeart();
  mouse.click=false;
  if(lives<=0) state="gameover";
  else loadLevel();
}

/* ========= GROUND ========= */
function onGround(px){
  const L=levels[levelIndex];
  if(L.gapAnim){
    return !(px>L.gapAnim.x && px<L.gapAnim.x+L.gapAnim.w);
  }
  if(!L.gaps) return true;
  for(const g of L.gaps){
    if(px>g.x && px<g.x+g.w) return false;
  }
  return true;
}

/* ========= UPDATE ========= */
function update(){
if(state!=="game") return;

p.vx=0;
if(keys.ArrowRight){p.vx=4; p.face=1;}
if(keys.ArrowLeft){p.vx=-4; p.face=-1;}
if(keys[" "] && p.grounded){p.vy=-13;}

p.vy+=0.8;
p.x+=p.vx;
p.y+=p.vy;

if(p.y>GROUND_Y+80){ die(); return; }

const footX=p.x+p.w/2;
if(p.y+p.h>=GROUND_Y && onGround(footX)){
  p.y=GROUND_Y-p.h; p.vy=0; p.grounded=true;
}else p.grounded=false;

const L=levels[levelIndex];

/* gap animation */
if(L.gapAnim && p.x>L.gapAnim.trigger){
  if(!L.gapAnim.started){
    softTone(180,0.25,0.06); // gap warning 
    L.gapAnim.started=true;
  }
  L.gapAnim.w=Math.min(L.gapAnim.w+L.gapAnim.speed,L.gapAnim.max);
  if(L.gapAnim.w===L.gapAnim.max && !L.gapAnim.shook){
    camShake=6;
    L.gapAnim.shook=true;
  }
}

/* ceiling trap */
if(L.ceilingSpike && p.vy<0){ die(); return; }

/* spikes */
if(L.spikes){
  for(const s of L.spikes){
    if(rectHit(p.x,p.y,p.w,p.h,s.x,GROUND_Y-20,20,20)){
      die(); return;
    }
  }
}

/* doors */
if(L.doors){
  for(const d of L.doors){
    if(rectHit(p.x,p.y,p.w,p.h,d.x,DOOR_Y,DOOR_W,DOOR_H)){
      const side = p.y+p.h > DOOR_Y+12;
      if(d.fake && p.grounded && side){ die(); return; }
      if(!d.fake){
        levelIndex++;
        if(levelIndex>=levels.length){ state="end"; return; }
        loadLevel(); return;
      }
    }
  }
}else{
  if(rectHit(p.x,p.y,p.w,p.h,doorX,DOOR_Y,DOOR_W,DOOR_H)){
    levelIndex++;
    if(levelIndex>=levels.length){ state="end"; return; }
    loadLevel();
  }
}

if(L.movingDoor && p.x>600) doorX+=2;
}

/* ========= DRAW ========= */
function draw(){
ctx.setTransform(1,0,0,1,0,0);
if(camShake>0){
  camShake--;
  ctx.translate(Math.random()*4-2,Math.random()*4-2);
}
ctx.clearRect(0,0,960,480);
ctx.textAlign="center";

/* MENU */
if(state==="menu"){
  ctx.fillStyle=C.bg;
  ctx.fillRect(0,0,960,480);

  ctx.fillStyle=C.khaki;
  ctx.font="36px DevilFont";
  ctx.fillText("LEVEL DEVIL",480,180);

  ctx.font="20px DevilFont";
  ctx.fillText("Press ENTER to start",480,220);

  /* BACK TO HUB BUTTON */
  const hubX=380;
  const hubY=280;
  const hubW=200;
  const hubH=50;

  ctx.fillStyle="#2ecc71";
  ctx.fillRect(hubX,hubY,hubW,hubH);

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("BACK TO HUB",480,312);

  if(
    mouse.click &&
    mouse.x>hubX &&
    mouse.x<hubX+hubW &&
    mouse.y>hubY &&
    mouse.y<hubY+hubH
  ){
    mouse.click=false;
    location.href="index.html";
  }

  return;
}

/* PAUSED */
if(state==="paused"){
  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(0,0,960,480);
  ctx.fillStyle=C.khaki;
  ctx.font = "20px DevilFont";
  ctx.fillText("PAUSED",480,140);

  const buttons=[
    {t:"RESUME",y:220,a:()=>state="game"},
    {t:"RESTART",y:280,a:()=>startGame()},
    {t:"QUIT",y:340,a:()=>state="menu"}
  ];

  buttons.forEach(b=>{
    const bx=380,by=b.y-28,bw=200,bh=44;
    ctx.fillStyle=C.hunter;
    ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=C.khaki;
    ctx.font = "20px DevilFont";
    ctx.fillText(b.t,480,b.y);
    if(mouse.click && mouse.x>bx && mouse.x<bx+bw && mouse.y>by && mouse.y<by+bh){
      mouse.click=false; b.a();
    }
  });
  return;
}

/* GAME OVER */
if(state==="gameover"){
  ctx.fillStyle=C.bg;
  ctx.fillRect(0,0,960,480);
  ctx.fillStyle=C.khaki;
  ctx.font = "32px DevilFont";
  ctx.fillText("GAME OVER",480,160);
  ctx.font = "20px DevilFont";
  ctx.fillText("Bot can play better than you",480,210);

const bx=380,by=250,bw=200,bh=50;
ctx.fillStyle=C.hunter;
ctx.fillRect(bx,by,bw,bh);
ctx.fillStyle=C.khaki;
ctx.font="20px Arial";
ctx.fillText("TRY AGAIN NOOB",480,282);

if(mouse.click &&
   mouse.x>bx && mouse.x<bx+bw &&
   mouse.y>by && mouse.y<by+bh){
  mouse.click=false;
  startGame();
}

/* BACK TO HUB BUTTON */
const hubX=380, hubY=320, hubW=200, hubH=50;

ctx.fillStyle="#2ecc71"; // green
ctx.fillRect(hubX,hubY,hubW,hubH);

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("BACK TO HUB",480,352);
if(
  mouse.click &&
  mouse.x > hubX &&
  mouse.x < hubX + hubW &&
  mouse.y > hubY &&
  mouse.y < hubY + hubH
){
  mouse.click = false;
  location.href = "index.html";
}

return;
}

/* END */
if(state==="end"){
  ctx.fillStyle=C.bg;
  ctx.fillRect(0,0,960,480);

  ctx.fillStyle=C.khaki;
  ctx.font="36px DevilFont";
  ctx.fillText("YOU WIN!",480,200);

  ctx.font="20px DevilFont";
  ctx.fillText("Congratulations!",480,240);

  /* BACK TO HUB BUTTON */
  const hubX=380;
  const hubY=300;
  const hubW=200;
  const hubH=50;

  ctx.fillStyle="#2ecc71";
  ctx.fillRect(hubX,hubY,hubW,hubH);

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText("BACK TO HUB",480,332);

  if(
    mouse.click &&
    mouse.x > hubX &&
    mouse.x < hubX + hubW &&
    mouse.y > hubY &&
    mouse.y < hubY + hubH
  ){
    mouse.click = false;
    location.href = "index.html";
  }

  return;
}

/* ground */
ctx.fillStyle=C.ground;
let segs=[{x:0,w:960}],L=levels[levelIndex];
if(L.gapAnim){
  segs=[{x:0,w:L.gapAnim.x},{x:L.gapAnim.x+L.gapAnim.w,w:960}];
}else if(L.gaps){
  segs=[];let lx=0;
  for(const g of L.gaps){segs.push({x:lx,w:g.x-lx});lx=g.x+g.w;}
  segs.push({x:lx,w:960-lx});
}
for(const s of segs) ctx.fillRect(s.x,GROUND_Y,s.w,100);

/* crack */
if(L.gapAnim && L.gapAnim.w>0){
  ctx.strokeStyle=C.dark;
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(L.gapAnim.x+L.gapAnim.w/2,GROUND_Y);
  ctx.lineTo(L.gapAnim.x+L.gapAnim.w/2+Math.sin(Date.now()*0.01)*8,GROUND_Y+12);
  ctx.stroke();
}

/* spikes */
if(L.spikes){
  ctx.fillStyle=C.dark;
  for(const s of L.spikes){
    ctx.beginPath();
    ctx.moveTo(s.x,GROUND_Y);
    ctx.lineTo(s.x+10,GROUND_Y-20);
    ctx.lineTo(s.x+20,GROUND_Y);
    ctx.fill();
  }
}

/* doors */
if(L.doors){
  for(const d of L.doors){
    ctx.fillStyle=d.fake?C.dark:C.hunter;
    const h=d.fake?DOOR_H-10:DOOR_H;
    const y=DOOR_Y+(DOOR_H-h);
    ctx.fillRect(d.x,y,DOOR_W,h);
  }
}else{
  ctx.fillStyle=C.hunter;
  ctx.fillRect(doorX,DOOR_Y,DOOR_W,DOOR_H);
}

/* hearts */
for(const h of hearts){
  ctx.fillStyle=C.heart;
  ctx.fillRect(h.x+4,h.y,8,8);
  ctx.fillRect(h.x,h.y+4,8,8);
  ctx.fillRect(h.x+8,h.y+4,8,8);
  ctx.fillRect(h.x+4,h.y+8,8,8);
}

/* level text */
ctx.fillStyle=C.dark;
ctx.font = "16px DevilFont";
ctx.textAlign="right";
ctx.fillText(`LEVEL ${levelIndex+1} / ${levels.length}`,940,24);

/* player */
drawPlayer();
}

/* ========= PLAYER DRAW ========= */
function drawPlayer(){
  ctx.save();
  ctx.translate(p.x+p.w/2,p.y);
  ctx.scale(p.face,1);
  ctx.translate(-p.w/2,0);
  ctx.fillStyle=C.hunter;
  ctx.beginPath();
  ctx.roundRect(0,0,p.w,p.h,10);
  ctx.fill();
  ctx.fillStyle=C.dark;
  ctx.roundRect(-8,10,8,20,4);
  ctx.fill();
  ctx.fillStyle=C.khaki;
  ctx.beginPath();
  ctx.ellipse(p.w-6,18,7,5,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

/* ========= LOOP ========= */
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
resetHearts();
loop();
</script>

</body>
</html>
