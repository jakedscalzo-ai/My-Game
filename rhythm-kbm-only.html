<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Rhythm Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #111;
            border: 4px solid #333;
            overflow: hidden;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        #score-board, #combo-board {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            margin-bottom: 5px;
        }
        #mobile-controls{
    position:fixed;
    bottom:10px;
    left:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:10px;
}

#mobile-controls button{
    width:22vw;
    max-width:90px;
    height:80px;
    font-size:30px;
    border:none;
    border-radius:15px;
    background:#333;
    color:white;
}

#mobile-controls button:active{
    background:#00ccff;
}
        #judgment {
            position: absolute;
            top: 40%;
            width: 100%;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
            opacity: 0;
            transition: opacity 0.1s ease;
            z-index: 10;
        }
        #lanes {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .lane {
            position: relative;
            flex: 1;
            height: 100%;
            border-right: 1px dashed #333;
        }
        .lane:last-child {
            border-right: none;
        }
        /* Receptors fixed at the bottom */
        .receptor {
            position: absolute;
            bottom: 50px;
            width: 100%;
            height: 20px;
            background-color: rgba(255, 255, 255, 0.2);
            border-top: 2px solid #fff;
            border-bottom: 2px solid #fff;
            text-align: center;
            line-height: 16px;
            font-weight: bold;
            color: #666;
        }
        .receptor.active {
            background-color: rgba(255, 255, 255, 0.6);
            color: #fff;
        }
        /* Falling notes */
        .note {
            position: absolute;
            width: 100%;
            height: 60px;
            background: linear-gradient(180deg, #00ffcc, #0099ff);
            border-radius: 4px;
            box-shadow: 0 0 8px #00ffcc;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="score-board">Score: 0</div>
            <div id="combo-board">Combo: 0</div>
        </div>
        <div id="judgment">Perfect</div>
        
        <div id="lanes">
            <div class="lane" id="lane-0"><div class="receptor">D</div></div>
            <div class="lane" id="lane-1"><div class="receptor">F</div></div>
            <div class="lane" id="lane-2"><div class="receptor">J</div></div>
            <div class="lane" id="lane-3"><div class="receptor">K</div></div>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        const scoreBoard = document.getElementById('score-board');
        const comboBoard = document.getElementById('combo-board');
        const judgmentEl = document.getElementById('judgment');
        
        const lanes = [
            document.getElementById('lane-0'),
            document.getElementById('lane-1'),
            document.getElementById('lane-2'),
            document.getElementById('lane-3')
        ];
        const receptors = document.querySelectorAll('.receptor');

        const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
        let score = 0;
        let combo = 0;
        let notes = [];
        
        // Game configuration settings
        const noteSpeed = 13; // Pixels per frame
        const targetY = 530; // Y coordinate matching the receptor's hit line
        const hitWindow = 40; // Max allowed distance threshold for registering a hit

        // Timing generator for random music notes
        let spawnTimer = 0;
        const spawnInterval = 45; // Lower values mean more rapid notes

        function spawnNote() {
            const laneIndex = Math.floor(Math.random() * 4);
            const noteEl = document.createElement('div');
            noteEl.classList.add('note');
            noteEl.style.top = '0px';
            lanes[laneIndex].appendChild(noteEl);

            notes.push({
                element: noteEl,
                lane: laneIndex,
                y: 0
            });
        }

        function showJudgment(text, color) {
            judgmentEl.innerText = text;
            judgmentEl.style.color = color;
            judgmentEl.style.opacity = '1';
            setTimeout(() => { judgmentEl.style.opacity = '0'; }, 300);
        }

        // Core Game Logic Update Loop
        function update() {
            // Note Spawning Engine
            spawnTimer++;
            if (spawnTimer >= spawnInterval) {
                spawnNote();
                spawnTimer = 0;
            }

            // Note Movement Engine
            for (let i = notes.length - 1; i >= 0; i--) {
                let note = notes[i];
                note.y += noteSpeed;
                note.element.style.top = note.y + 'px';

                // Miss boundary validation
                if (note.y > gameContainer.offsetHeight) {
                    note.element.remove();
                    notes.splice(i, 1);
                    combo = 0;
                    comboBoard.innerText = `Combo: ${combo}`;
                    showJudgment('Miss', '#ff3333');
                }
            }

            requestAnimationFrame(update);
        }
        function pressLane(key){
    const event = new KeyboardEvent('keydown', {
        key: key
    });
    window.dispatchEvent(event);
}

function releaseLane(key){
    const event = new KeyboardEvent('keyup', {
        key: key
    });
    window.dispatchEvent(event);
}

document.querySelectorAll('#mobile-controls button')
.forEach(btn => {

    btn.addEventListener('touchstart', e=>{
        e.preventDefault();
        pressLane(btn.dataset.key);
    });

    btn.addEventListener('touchend', e=>{
        e.preventDefault();
        releaseLane(btn.dataset.key);
    });
});

        // Input Engine & Hit Verification Matrix
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keyMap[key] !== undefined) {
                const laneIndex = keyMap[key];
                receptors[laneIndex].classList.add('active');

                // Evaluate closest target note inside the active lane
                let hitTargetIndex = -1;
                let minDistance = Infinity;

                for (let i = 0; i < notes.length; i++) {
                    if (notes[i].lane === laneIndex) {
                        let distance = Math.abs(notes[i].y - targetY);
                        if (distance < minDistance) {
                            minDistance = distance;
                            hitTargetIndex = i;
                        }
                    }
                }

                // Apply score matrix parameters if valid target note is hit
                if (hitTargetIndex !== -1 && minDistance <= hitWindow) {
                    const hitNote = notes[hitTargetIndex];
                    
                    if (minDistance <= 15) {
                        score += 100;
                        combo++;
                        showJudgment('Perfect!', '#00ffcc');
                    } else if (minDistance <= 30) {
                        score += 50;
                        combo++;
                        showJudgment('Good', '#ffff00');
                    } else {
                        score += 20;
                        combo++;
                        showJudgment('Bad', '#ff9900');
                    }

                    scoreBoard.innerText = `Score: ${score}`;
                    comboBoard.innerText = `Combo: ${combo}`;
                    
                    hitNote.element.remove();
                    notes.splice(hitTargetIndex, 1);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keyMap[key] !== undefined) {
                const laneIndex = keyMap[key];
                receptors[laneIndex].classList.remove('active');
            }
        });

        // Initialize Loop Execution
        update();
    </script>
</body>
</html>
