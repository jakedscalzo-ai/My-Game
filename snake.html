<!DOCTYPE html>
<html>
<head>
<title>🐍 Snake (KBM only)</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: cyan;
    text-shadow: 0 0 15px cyan;
}

canvas {
    background: #050505;
    border: 4px solid cyan;
    box-shadow: 0 0 25px cyan;
}

#score {
    font-size: 22px;
    margin: 10px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    background: cyan;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background:white;
}
#gameOverScreen{
    display:none;

    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    background:black;
    color:white;

    border:3px solid cyan;
    border-radius:20px;

    padding:35px;

    box-shadow:0 0 25px cyan;

    z-index:100;

    text-align:center;
}

#gameOverScreen button{
    width:220px;
    padding:14px;

    font-size:22px;

    background:cyan;
    color:black;

    border:none;
    border-radius:12px;

    cursor:pointer;
}

#gameOverScreen button:hover{
    background:white;
}
#startScreen {

    position: fixed;
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    background:black;

    border:3px solid cyan;

    padding:30px;

    box-shadow:0 0 20px cyan;

    color:white;

    font-size:25px;

    z-index:10;
}

</style>

</head>

<body>

<h1>Snake (KBM only)</h1>

<div id="score">
Score: 0
</div>
<div id="startScreen">
    <h2>Snake</h2>
    <p>Press any key to start</p>
</div>

<canvas id="game" width="450" height="510"></canvas>

<br>

<button onclick="location.href='index.html'">
Back to Arcade Hub
</button>


<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");


// GRID SIZE
const tile = 30;

const cols = 15;
const rows = 17;

canvas.width = cols * tile;
canvas.height = rows * tile;


// SNAKE
let snake = [
    {x:7,y:8},
    {x:6,y:8},
    {x:5,y:8}
];


let direction = {
    x:1,
    y:0
};


let nextDirection = direction;


// APPLE
let apple = {
    x:10,
    y:8
};


let score = 0;
let gameOver = false;
let started = false;




function randomApple(){

    apple.x = Math.floor(Math.random()*cols);
    apple.y = Math.floor(Math.random()*rows);


    // don't spawn inside snake
    snake.forEach(part=>{
        if(part.x===apple.x && part.y===apple.y){
            randomApple();
        }
    });
}




function drawGrid(){

    ctx.strokeStyle="#111";

    for(let x=0;x<cols;x++){

        for(let y=0;y<rows;y++){

            ctx.strokeRect(
                x*tile,
                y*tile,
                tile,
                tile
            );

        }
    }

}



// DRAW APPLE

function drawApple(){

    let x = apple.x*tile;
    let y = apple.y*tile;


    // apple body
    ctx.fillStyle="red";
    ctx.beginPath();

    ctx.arc(
        x+tile/2,
        y+tile/2+3,
        tile/2-5,
        0,
        Math.PI*2
    );

    ctx.fill();



    // shine

    ctx.fillStyle="white";

    ctx.beginPath();

    ctx.arc(
        x+10,
        y+10,
        4,
        0,
        Math.PI*2
    );

    ctx.fill();



    // leaf

    ctx.fillStyle="lime";

    ctx.beginPath();

    ctx.ellipse(
        x+20,
        y+5,
        8,
        4,
        -0.5,
        0,
        Math.PI*2
    );

    ctx.fill();

}




// DRAW SNAKE

function drawSnake(){

    snake.forEach((part,index)=>{

        let x=part.x*tile;
        let y=part.y*tile;


        // head

        if(index===0){

            ctx.fillStyle="#00ffff";

            ctx.beginPath();

            ctx.roundRect(
                x+2,
                y+2,
                tile-4,
                tile-4,
                10
            );

            ctx.fill();



            // eyes

            ctx.fillStyle="black";

            ctx.beginPath();
            ctx.arc(
                x+20,
                y+10,
                4,
                0,
                Math.PI*2
            );
            ctx.fill();


            ctx.beginPath();
            ctx.arc(
                x+20,
                y+20,
                4,
                0,
                Math.PI*2
            );
            ctx.fill();

        }


        // body

        else {

            ctx.fillStyle="#00aa88";

            ctx.beginPath();

            ctx.roundRect(
                x+3,
                y+3,
                tile-6,
                tile-6,
                8
            );

            ctx.fill();

        }

    });


}



// MOVE

function update(){

    if(gameOver || !started) return;


    if(inputQueue.length > 0){

    let newDirection = inputQueue.shift();


    // prevent instant reverse
    if(
        newDirection.x !== -direction.x ||
        newDirection.y !== -direction.y
    ){
        direction = newDirection;
    }

}


    let head={
        x:snake[0].x+direction.x,
        y:snake[0].y+direction.y
    };



    // wall hit

    if(
        head.x<0 ||
        head.x>=cols ||
        head.y<0 ||
        head.y>=rows
    ){
        endGame();
    }



    // snake hit

    snake.forEach(part=>{

        if(
            head.x===part.x &&
            head.y===part.y
        ){
            endGame();
        }

    });



    snake.unshift(head);



    // eat apple

    if(
        head.x===apple.x &&
        head.y===apple.y
    ){

        score++;

        document.getElementById("score").innerHTML =
        "Score: "+score;

        randomApple();

    }

    else{

        snake.pop();

    }

}




function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );


    drawGrid();

    drawApple();

    drawSnake();


}




function endGame(){

    gameOver = true;

    document.getElementById("finalScore").innerHTML =
        "Score: " + score;

    document.getElementById("gameOverScreen").style.display =
        "block";
}




let inputQueue = [];


document.addEventListener("keydown", e => {
    if(!started){
    started = true;
    document.getElementById("startScreen").style.display = "none";
}

    let move = null;


    if(e.key === "ArrowUp"){
        move = {x:0,y:-1};
    }

    if(e.key === "ArrowDown"){
        move = {x:0,y:1};
    }

    if(e.key === "ArrowLeft"){
        move = {x:-1,y:0};
    }

    if(e.key === "ArrowRight"){
        move = {x:1,y:0};
    }


    if(move){

        // allow fast inputs
        if(inputQueue.length < 10){
            inputQueue.push(move);
        }

    }

});






setInterval(()=>{

    update();
    draw();

},120);


</script>



<div id="gameOverScreen">

    <h2>GAME OVER</h2>

    <div id="finalScore">
        Score: 0
    </div>

    <br>

    <button onclick="location.reload()">
        Play Again
    </button>

    <br><br>

    <button onclick="location.href='index.html'">
        Return To Hub
    </button>

</div>
</body>
</html>
